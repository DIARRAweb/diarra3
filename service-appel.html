<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mali Wari - Service Appel</title>
<style>
body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:#0d3b66;
  color:white;
  padding:20px;
}
.card{
  max-width:430px;
  margin:20px auto;
  background:white;
  color:#0d3b66;
  border-radius:24px;
  padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}
h1{text-align:center;}
.call-item{
  background:#f3f6fb;
  padding:15px;
  border-radius:18px;
  margin-top:12px;
}
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  color:white;
  background:#16a34a;
}
.end{background:#d90429;}
audio{width:100%;margin-top:15px;}
</style>
</head>
<body>

<div class="card">
  <h1>📞 Service Appel</h1>
  <p>Appels entrants des utilisateurs Mali Wari.</p>

  <div id="callsList"></div>

  <audio id="remoteAudio" autoplay playsinline controls></audio>

  <button class="end" onclick="endCurrentCall()">Raccrocher</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  update,
  push
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsKMDF-nX-4tM_Hh0JPozZRuY9x9sFmh4",
  authDomain: "securite-53ada.firebaseapp.com",
  databaseURL:"https://securite-53ada-default-rtdb.firebaseio.com/",
  projectId: "securite-53ada",
  storageBucket: "securite-53ada.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentPeer = null;
let currentStream = null;
let currentCallId = null;

const rtcConfig = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },

    {
      urls: [
        "turn:187.124.112.223:3478?transport=udp",
        "turn:187.124.112.223:3478?transport=tcp"
      ],
      username: "cobraadmin",
      credential: "Cobra2026Secure"
    }
  ]
};

onValue(ref(db, "serviceCalls"), snap => {
  const callsList = document.getElementById("callsList");
  callsList.innerHTML = "";

  if(!snap.exists()){
    callsList.innerHTML = "<p>Aucun appel entrant.</p>";
    return;
  }

  Object.entries(snap.val()).reverse().forEach(([id, call]) => {
    if(call.status !== "ringing") return;

    callsList.innerHTML += `
      <div class="call-item">
        <strong>👤 ${call.userName || "Utilisateur"}</strong><br>
        📱 ${call.userPhone || ""}<br>
        <button onclick="acceptCall('${id}')">✅ Décrocher</button>
        <button class="end" onclick="rejectCall('${id}')">❌ Refuser</button>
      </div>
    `;
  });
});

window.acceptCall = async function(callId){
  try{
    currentCallId = callId;

    const callSnapRef = ref(db, "serviceCalls/" + callId);

    currentStream = await navigator.mediaDevices.getUserMedia({
      audio:true,
      video:false
    });

    currentPeer = new RTCPeerConnection(rtcConfig);

    currentStream.getTracks().forEach(track => {
      currentPeer.addTrack(track, currentStream);
    });

    currentPeer.ontrack = function(event){
      const audio = document.getElementById("remoteAudio");
      audio.srcObject = event.streams[0];
      audio.play().catch(()=>{});
    };

    currentPeer.onicecandidate = async function(event){
      if(event.candidate){
        await push(ref(db, "serviceCalls/" + callId + "/adminCandidates"), {
          candidate:event.candidate.toJSON()
        });
      }
    };

    onValue(callSnapRef, async snap => {
      const call = snap.val();
      if(!call || !call.offer || !currentPeer) return;

      if(!currentPeer.currentRemoteDescription){
        await currentPeer.setRemoteDescription(
          new RTCSessionDescription(call.offer)
        );

        const answer = await currentPeer.createAnswer();
        await currentPeer.setLocalDescription(answer);

        await update(ref(db, "serviceCalls/" + callId), {
          status:"accepted",
          answer:{
            type:answer.type,
            sdp:answer.sdp
          },
          acceptedAt:Date.now()
        });
      }
    });

    onValue(ref(db, "serviceCalls/" + callId + "/callerCandidates"), snap => {
      const data = snap.val();
      if(!data || !currentPeer) return;

      Object.values(data).forEach(async item => {
        try{
          await currentPeer.addIceCandidate(
            new RTCIceCandidate(item.candidate)
          );
        }catch(e){
          console.log("Erreur ICE utilisateur:", e);
        }
      });
    });

  }catch(error){
    alert("Erreur appel : " + error.message);
  }
};

window.rejectCall = async function(callId){
  await update(ref(db, "serviceCalls/" + callId), {
    status:"rejected",
    rejectedAt:Date.now()
  });
};

window.endCurrentCall = async function(){
  if(currentStream){
    currentStream.getTracks().forEach(track => track.stop());
  }

  if(currentPeer){
    currentPeer.close();
  }

  if(currentCallId){
    await update(ref(db, "serviceCalls/" + currentCallId), {
      status:"ended",
      endedAt:Date.now()
    });
  }

  currentPeer = null;
  currentStream = null;
  currentCallId = null;

  alert("📞 Appel terminé");
};
</script>

</body>
</html>
